
<!DOCTYPE html>
<html lang="">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Заголовок нашей страницы </title>

		<!-- Bootstrap CSS -->
		<link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="css/style.css">

		<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
		<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
		<!--[if lt IE 9]>
			<script src="https://oss.maxcdn.com/libs/html5shiv/3.7.3/html5shiv.js"></script>
			<scrpt src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
		<![endif]-->
	</head>
	<body>
    <div class="container">
			<button class="btn btn-agree btn-danger btn-lg" href="#delete-window" data-toggle="modal">Удалить файл?</button>
		</div>

		<!-- Модальное окно от Bootstrap -->
		<div class="modal fade" id="delete-window" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel">
			<div class="modal-dialog modal-lg" role="document">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
         <h4 class="modal-title">Вы точно хотите удалить файл?</h4>
				  <div class="modal-content">
					 <div class="wrap-block-1">
						<button class="btn btn-success btn-lg col-md-4 col-md-offset-2">Да</button>
					 </div>
					<div class="wrap-block-2">
						<button class="btn btn-danger btn-lg col-md-4 col-md-offset-1">Нет</button>
					</div>
				 </div>
			</div>
		</div>


		<!-- Обязательная библиотека jQuery -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
		<!-- Bootstrap JavaScript -->
     <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
	</body>
</html>
